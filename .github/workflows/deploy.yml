name: Deploy to Azure Container Apps

# Builds the five images in ACR (server-side, via `az acr build` — no Docker on the
# runner) and rolls each Container App to the new tag. Auth is OIDC (federated
# credentials) — no long-lived secrets. Infra must already exist (see infra/README.md).
#
# Required GitHub config (Settings → Secrets and variables → Actions):
#   secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   vars:    AZURE_RESOURCE_GROUP   (e.g. hrats-prod-rg)
#   vars:    AZURE_AD_CLIENT_ID, AZURE_AD_TENANT_ID   (Entra SSO app for the dashboard)
#
# The Entra vars are NOT secret — they are baked into the dashboard's public client
# bundle anyway (Next.js NEXT_PUBLIC_*). If AZURE_AD_CLIENT_ID is unset, the dashboard
# builds in DEV sign-in mode (no real Microsoft SSO) — see the web-build step.
#
# The federated app registration needs (on the resource group): AcrPush + Contributor
# (or the narrower "Container Apps Contributor" + "AcrPush").

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to build & deploy (default: git SHA)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-aca
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.imageTag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover ACR + API FQDN
        id: env
        run: |
          set -euo pipefail
          ACR_NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          ACR_LOGIN=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
          # FQDNs exist as soon as the apps are created, even before a working image.
          API_FQDN=$(az containerapp show -n hrats-prod-api -g "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          # Dashboard FQDN → the Entra redirect URI (MSAL falls back to window.origin,
          # but we pass it explicitly so the baked config is unambiguous).
          DASH_FQDN=$(az containerapp show -n hrats-prod-dashboard -g "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "acr_name=$ACR_NAME"     >> "$GITHUB_OUTPUT"
          echo "acr_login=$ACR_LOGIN"   >> "$GITHUB_OUTPUT"
          echo "api_url=https://$API_FQDN" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=https://$DASH_FQDN" >> "$GITHUB_OUTPUT"
          echo "ACR=$ACR_LOGIN  API=https://$API_FQDN  DASH=https://$DASH_FQDN"

      # --- Build all five images server-side in ACR (parallel-ish, each is a task) ---
      - name: Build backend images (api/worker/scheduler)
        env:
          ACR: ${{ steps.env.outputs.acr_name }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          for SVC in api worker scheduler; do
            az acr build -r "$ACR" -t "hr-ats/$SVC:$TAG" -t "hr-ats/$SVC:latest" \
              --build-arg SVC=$SVC -f backend/Dockerfile backend &
          done
          wait

      - name: Build web images (career-portal/dashboard)
        env:
          ACR: ${{ steps.env.outputs.acr_name }}
          TAG: ${{ steps.tag.outputs.tag }}
          API_URL: ${{ steps.env.outputs.api_url }}
          DASH_URL: ${{ steps.env.outputs.dashboard_url }}
          AD_CLIENT_ID: ${{ vars.AZURE_AD_CLIENT_ID }}
          AD_TENANT_ID: ${{ vars.AZURE_AD_TENANT_ID }}
          AD_AUTHORITY: ${{ vars.AZURE_AD_AUTHORITY }}
        run: |
          set -euo pipefail
          # Career portal — only the public API origin is baked in.
          az acr build -r "$ACR" -t "hr-ats/career-portal:$TAG" -t "hr-ats/career-portal:latest" \
            --build-arg NEXT_PUBLIC_API_URL="$API_URL" -f career-portal/Dockerfile career-portal &

          # Dashboard — bake the Entra SSO config too. NEXT_PUBLIC_* are inlined at
          # build time, and lib/auth.ts gates real SSO on NEXT_PUBLIC_AZURE_AD_CLIENT_ID;
          # omitting these silently ships DEV sign-in mode (no Microsoft login).
          DASH_ARGS=(--build-arg NEXT_PUBLIC_API_URL="$API_URL")
          if [ -n "${AD_CLIENT_ID:-}" ]; then
            DASH_ARGS+=(
              --build-arg NEXT_PUBLIC_AZURE_AD_CLIENT_ID="$AD_CLIENT_ID"
              --build-arg NEXT_PUBLIC_AZURE_AD_TENANT_ID="$AD_TENANT_ID"
              --build-arg NEXT_PUBLIC_AZURE_AD_REDIRECT_URI="$DASH_URL"
            )
            # Multi-tenant SSO: set the AZURE_AD_AUTHORITY var to
            # https://login.microsoftonline.com/organizations so MSAL accepts any
            # allowed org. Unset ⇒ single-tenant (home tenant only).
            if [ -n "${AD_AUTHORITY:-}" ]; then
              DASH_ARGS+=(--build-arg NEXT_PUBLIC_AZURE_AD_AUTHORITY="$AD_AUTHORITY")
            fi
          else
            echo "::warning::AZURE_AD_CLIENT_ID var is unset — dashboard will build in DEV sign-in mode (no Entra SSO)"
          fi
          az acr build -r "$ACR" -t "hr-ats/dashboard:$TAG" -t "hr-ats/dashboard:latest" \
            "${DASH_ARGS[@]}" -f frontend/Dockerfile frontend &
          wait

      # --- Roll each Container App to the new tag ---
      - name: Update Container Apps
        env:
          ACR_LOGIN: ${{ steps.env.outputs.acr_login }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          declare -A APP_IMAGE=(
            [hrats-prod-api]=api
            [hrats-prod-worker]=worker
            [hrats-prod-scheduler]=scheduler
            [hrats-prod-portal]=career-portal
            [hrats-prod-dashboard]=dashboard
          )
          for APP in "${!APP_IMAGE[@]}"; do
            REPO="${APP_IMAGE[$APP]}"
            echo "::group::$APP -> $ACR_LOGIN/hr-ats/$REPO:$TAG"
            az containerapp update -n "$APP" -g "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN/hr-ats/$REPO:$TAG"
            echo "::endgroup::"
          done

      - name: Smoke check API health
        run: |
          set -euo pipefail
          API_URL="${{ steps.env.outputs.api_url }}"
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || true)
            if [ "$code" = "200" ]; then echo "API healthy"; exit 0; fi
            echo "waiting for API ($code)..."; sleep 10
          done
          echo "API did not report healthy in time"; exit 1
