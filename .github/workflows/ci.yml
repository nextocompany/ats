name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hr_db
          POSTGRES_USER: hruser
          POSTGRES_PASSWORD: hrpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hruser -d hr_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: postgres://hruser:hrpass@localhost:5432/hr_db?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Test
        working-directory: backend
        run: go test ./... -cover

      - name: Install migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Migrate up/down round-trip
        run: |
          migrate -path backend/migrations -database "$DB_URL" up
          migrate -path backend/migrations -database "$DB_URL" down -all
