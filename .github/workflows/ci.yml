name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hr_db
          POSTGRES_USER: hruser
          POSTGRES_PASSWORD: hrpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hruser -d hr_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: postgres://hruser:hrpass@localhost:5432/hr_db?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: backend

      - name: Test
        working-directory: backend
        run: go test ./... -cover

      - name: Install migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Migrate up/down round-trip
        run: |
          migrate -path backend/migrations -database "$DB_URL" up
          migrate -path backend/migrations -database "$DB_URL" down -all

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum
      - name: Boot stack
        run: docker compose up -d --build
      - name: Wait for API health
        run: for i in $(seq 1 60); do curl -sf http://localhost:8080/health && break; sleep 2; done
      - name: Migrate + seed
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          make migrate-up && make seed
      - name: Integration tests
        working-directory: backend
        # -p 1 serializes package test binaries: every *_integration_test.go
        # TRUNCATEs the shared Postgres on setup (it assumes DB ownership), so
        # running packages in parallel races (vanished rows / TRUNCATE deadlocks).
        run: go test -tags integration -p 1 ./... -count=1
      - name: Cross-system E2E
        working-directory: backend
        run: go test -tags e2e ./e2e/... -count=1
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail=200

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Boot stack
        run: docker compose up -d --build
      - name: Wait for API health
        run: for i in $(seq 1 60); do curl -sf http://localhost:8080/health && break; sleep 2; done
      - name: Migrate + seed
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          make migrate-up && make seed
      # Sequential per app: each Playwright webServer binds its own port (3001/3000).
      # Prod build (`pnpm start`) so the career-portal service worker is generated.
      - name: Career portal — build + Playwright
        working-directory: career-portal
        run: |
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pnpm build
          pnpm test:e2e
      - name: Dashboard — build + Playwright
        working-directory: frontend
        run: |
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pnpm build
          pnpm test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/e2e/__screens__/
            career-portal/e2e/__screens__/
            frontend/test-results/
            career-portal/test-results/
          if-no-files-found: ignore
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail=200

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        working-directory: backend
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-generated ./...
      - name: pnpm audit (frontend)
        working-directory: frontend
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high || true
      - name: pnpm audit (career-portal)
        working-directory: career-portal
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high || true
